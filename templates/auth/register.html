{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create an Account</h2>
            <p>Join the community and start making an impact</p>
        </div>
        <form class="auth-form" method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password">
            </div>
            <div class="form-group">
                <label for="location">City / Location</label>
                <input type="text" id="location" name="location" required placeholder="e.g. New York, NY">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
